databases:
  - name: codity-db
    databaseName: scheduler
    user: codity_user
    plan: free

services:
  - type: web
    name: codity-api
    env: node
    buildCommand: npm install && npm run migrate && npm run seed
    startCommand: npm run start:reaper & npm run start:worker & npm run start:api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codity-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: "*" # Set this to your Vercel URL once deployed for better security!
